<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能教案与PPT生成系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid white;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 2fr;
            min-height: 600px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            background: #f8f9fa;
            padding: 30px;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 200px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .content-area {
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-hidden {
            display: none;
        }

        .teaching-section {
            display: none;
        }

        .teaching-section.active {
            display: block;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: #e8e8e8;
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: loading 1.4s infinite;
            margin: 0 3px;
        }

        @keyframes loading {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-area button:hover {
            background: #764ba2;
        }

        .result-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-box .result-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-box .result-item:last-child {
            border-bottom: none;
        }

        .download-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .download-btn:hover {
            background: #764ba2;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin: 10px 0;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .template-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .template-card {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .template-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .template-card.selected {
            border-color: #667eea;
            background: #f0f7ff;
        }

        .template-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .template-description {
            font-size: 0.85em;
            color: #666;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 5px;
            margin: 20px 0;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .mode-selector {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
            }

            .template-gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 智能教案与PPT生成系统</h1>
            <p>基于多智能体和多模态RAG技术的教学助手</p>
        </div>

        <!-- 移除其他模式，只保留教学模式 -->

        <div class="main-content">
            <!-- 教学模式 -->
            <div id="teaching-mode" class="teaching-section active">
                <div class="sidebar">
                    <h2>课程信息</h2>

                    <div class="form-group">
                        <label>教学主题 *</label>
                        <input type="text" id="teaching-theme" placeholder="例如：人体循环系统">
                    </div>

                    <div class="form-group">
                        <label>学习目标 *</label>
                        <textarea id="teaching-objectives" placeholder="列举学生应该达成的3-5个学习目标"></textarea>
                    </div>

                    <div class="form-group">
                        <label>上传素材（图片/文档）</label>
                        <input type="file" id="teaching-materials" multiple accept=".pdf,.txt,.md,.docx,.png,.jpg,.jpeg,.gif,.bmp">
                        <p style="font-size: 12px; color: #666; margin-top: 6px;">支持 PDF、Word、文本、Markdown、常见图片格式</p>
                    </div>

                    <div class="form-group">
                        <label>PPT风格</label>
                        <div class="template-gallery" id="template-gallery">
                            <div class="template-card" onclick="selectTemplate('formal', this)">
                                <div class="template-name">📊 正式风格</div>
                                <div class="template-description">专业学术风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('colorful', this)">
                                <div class="template-name">🌈 彩色风格</div>
                                <div class="template-description">生动趣味风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('minimalist', this)">
                                <div class="template-name">⚪ 极简风格</div>
                                <div class="template-description">清晰简洁风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('creative', this)">
                                <div class="template-name">🎨 创意风格</div>
                                <div class="template-description">艺术创意风格</div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="generateLesson()">生成教案与PPT</button>
                </div>

                <div class="content-area">
                    <h2>生成结果</h2>
                    <div class="chat-messages" id="teaching-messages">
                        <p style="color: #999; text-align: center; padding: 20px;">
                            等待生成中...
                        </p>
                    </div>
                    <div id="teaching-result"></div>
                </div>
            </div>

            <!-- 其他模式已移除 -->
        </div>
    </div>

    <script>
        let selectedTemplate = 'formal';

        function selectTemplate(templateId, element) {
            selectedTemplate = templateId;
            console.log('Selected template:', templateId);
            document.querySelectorAll('.template-card').forEach(card => {
                card.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        async function generateLesson() {
            const theme = document.getElementById('teaching-theme').value;
            const objectives = document.getElementById('teaching-objectives').value;
            const materialsInput = document.getElementById('teaching-materials');
            const materials = materialsInput.files || [];

            if (!theme || !objectives) {
                alert('请填写必填项：教学主题、学习目标');
                return;
            }

            const messagesDiv = document.getElementById('teaching-messages');
            messagesDiv.innerHTML = '<div style="text-align: center;"><div class="loading"></div><div class="loading"></div><div class="loading"></div></div>';

            const userInput = `
教学主题：${theme}
学习目标：${objectives}
PPT风格：${selectedTemplate}
            `;

            const formData = new FormData();
            formData.append('message', userInput);
            formData.append('mode', 'teaching');
            formData.append('user_id', 'teacher_' + Date.now());
            formData.append('task_id', 'lesson_' + Date.now());
            Array.from(materials).forEach(file => {
                formData.append('files', file);
            });

            try {
                console.log('Sending request to /send_message_with_files with input:', userInput);

                const response = await fetch('/send_message_with_files', {
                    method: 'POST',
                    body: formData
                });

                console.log('Response received:', response.status);
                const data = await response.json();
                console.log('Response data:', data);

                messagesDiv.innerHTML = '';

                if (data.error) {
                    messagesDiv.innerHTML = `<div class="error-message">${data.error}</div>`;
                } else {
                    // Add response message
                    const statusBadge = `<span class="status-badge ${data.status}">${data.status}</span>`;
                    messagesDiv.innerHTML = `
                        <div class="message assistant">
                            <div class="message-content">
                                ${data.response}
                                ${statusBadge}
                                <p style="margin-top: 10px; color: #666;">
                                    ${data.processing_step}
                                </p>
                            </div>
                        </div>
                    `;

                    // Display export results if available
                    if (data.export_result && data.export_result.files) {
                        const resultDiv = document.getElementById('teaching-result');
                        let resultHTML = '<div class="result-box"><h3>✅ 生成完成</h3>';

                        if (data.export_result.files.docx) {
                            const docxFile = data.export_result.files.docx;
                            resultHTML += `
                                <div class="result-item">
                                    <strong>📄 教案文档：</strong><br>
                                    ${docxFile.format} (${docxFile.size_mb.toFixed(2)} MB)<br>
                                    <a href="${docxFile.path}" class="download-btn" download>下载教案</a>
                                </div>
                            `;
                        }

                        if (data.export_result.files.ppt) {
                            const pptFile = data.export_result.files.ppt;
                            resultHTML += `
                                <div class="result-item">
                                    <strong>🎨 PPT演示：</strong><br>
                                    ${pptFile.format} (${pptFile.size_mb.toFixed(2)} MB)<br>
                                    <a href="${pptFile.path}" class="download-btn" download>下载PPT</a>
                                </div>
                            `;
                        }

                        resultHTML += '</div>';
                        resultDiv.innerHTML = resultHTML;
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                messagesDiv.innerHTML = `<div class="error-message">错误：${error.message}</div>`;
            }
        }

        // Initialize
        selectTemplate('formal', document.querySelector('.template-card'));
    </script>
</body>
</html>
