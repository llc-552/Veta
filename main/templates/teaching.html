<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智能教案与PPT生成系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .mode-selector {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 12px 24px;
            border: 2px solid white;
            background: rgba(255,255,255,0.1);
            color: white;
            cursor: pointer;
            border-radius: 25px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .mode-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .mode-btn.active {
            background: white;
            color: #667eea;
            font-weight: bold;
        }

        .main-content {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 2fr;
            min-height: 600px;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .sidebar {
            background: #f8f9fa;
            padding: 30px;
            border-right: 1px solid #e0e0e0;
            overflow-y: auto;
        }

        .sidebar h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.3em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
            font-family: inherit;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 200px;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn-primary {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .content-area {
            padding: 30px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .section-hidden {
            display: none;
        }

        .teaching-section {
            display: none;
        }

        .teaching-section.active {
            display: block;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 80%;
            padding: 12px 15px;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .message.user .message-content {
            background: #667eea;
            color: white;
        }

        .message.assistant .message-content {
            background: #e8e8e8;
            color: #333;
        }

        .loading {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #667eea;
            border-radius: 50%;
            animation: loading 1.4s infinite;
            margin: 0 3px;
        }

        @keyframes loading {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .input-area {
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 0.95em;
        }

        .input-area button {
            padding: 12px 24px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .input-area button:hover {
            background: #764ba2;
        }

        .result-box {
            background: #f0f7ff;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
        }

        .result-box h3 {
            color: #667eea;
            margin-bottom: 10px;
        }

        .result-box .result-item {
            padding: 8px 0;
            border-bottom: 1px solid #e0e0e0;
        }

        .result-box .result-item:last-child {
            border-bottom: none;
        }

        .download-btn {
            display: inline-block;
            padding: 8px 16px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .download-btn:hover {
            background: #764ba2;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            font-weight: bold;
            margin: 10px 0;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.processing {
            background: #fff3cd;
            color: #856404;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .template-gallery {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .template-card {
            border: 2px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .template-card:hover {
            border-color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .template-card.selected {
            border-color: #667eea;
            background: #f0f7ff;
        }

        .template-name {
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .template-description {
            font-size: 0.85em;
            color: #666;
        }

        .kb-upload-area {
            border: 2px dashed #ccc;
            border-radius: 8px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            background: #fafafa;
        }
        .kb-upload-area:hover, .kb-upload-area.drag-over {
            border-color: #667eea;
            background: #f0f7ff;
        }
        .material-file-list {
            margin-top: 8px;
            font-size: 12px;
            color: #555;
            max-height: 120px;
            overflow-y: auto;
        }
        .material-file-item {
            padding: 3px 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
            border-radius: 4px;
        }
        .material-file-item:hover {
            background: #f0f0f0;
        }
        .material-file-item .file-label {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            overflow: hidden;
        }
        .material-file-item .file-label span:last-child {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .material-file-item .remove-btn {
            background: none;
            border: none;
            color: #aaa;
            cursor: pointer;
            font-size: 13px;
            padding: 0 2px;
            line-height: 1;
            flex-shrink: 0;
        }
        .material-file-item .remove-btn:hover {
            color: #e55;
        }
        .material-count {
            font-size: 11px;
            color: #888;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .mode-selector {
                flex-direction: column;
            }

            .mode-btn {
                width: 100%;
            }

            .template-gallery {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 智能教案与PPT生成系统</h1>
            <p>基于多智能体和多模态RAG技术的教学助手</p>
        </div>

        <!-- 移除其他模式，只保留教学模式 -->

        <div class="main-content">
            <!-- 教学模式 -->
            <div id="teaching-mode" class="teaching-section active">
                <div class="sidebar">
                    <h2>课程信息</h2>

                    <div class="form-group">
                        <label>教学主题 *</label>
                        <input type="text" id="teaching-theme" placeholder="例如：人体循环系统">
                    </div>

                    <div class="form-group">
                        <label>学习目标 *</label>
                        <textarea id="teaching-objectives" placeholder="列举学生应该达成的3-5个学习目标"></textarea>
                    </div>

                    <div class="form-group">
                        <label>📂 上传教学素材（图片 / 文档，同时作为知识库）</label>
                        <!-- Hidden input; files are accumulated in JS array `selectedFiles` -->
                        <input type="file" id="teaching-materials" multiple
                               accept=".pdf,.txt,.md,.docx,.png,.jpg,.jpeg,.gif,.bmp"
                               style="display:none" onchange="addMaterialFiles()">
                        <div class="kb-upload-area" onclick="document.getElementById('teaching-materials').click()"
                             id="materials-drop-zone">
                            <span>🖼 点击或拖拽上传（支持多次选择）</span><br>
                            <small style="color:#888">PDF、Word、文本、Markdown、图片 — 将同步作为知识库检索来源</small>
                        </div>
                        <div class="material-file-list" id="material-file-list"></div>
                        <div class="material-count" id="material-count"></div>
                    </div>

                    <div class="form-group">
                        <label>PPT风格</label>
                        <div class="template-gallery" id="template-gallery">
                            <div class="template-card" onclick="selectTemplate('formal', this)">
                                <div class="template-name">📊 正式风格</div>
                                <div class="template-description">专业学术风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('colorful', this)">
                                <div class="template-name">🌈 彩色风格</div>
                                <div class="template-description">生动趣味风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('minimalist', this)">
                                <div class="template-name">⚪ 极简风格</div>
                                <div class="template-description">清晰简洁风格</div>
                            </div>
                            <div class="template-card" onclick="selectTemplate('creative', this)">
                                <div class="template-name">🎨 创意风格</div>
                                <div class="template-description">艺术创意风格</div>
                            </div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="generateLesson()">生成教案与PPT</button>
                </div>

                <div class="content-area">
                    <h2>生成结果</h2>
                    <div class="chat-messages" id="teaching-messages">
                        <p style="color: #999; text-align: center; padding: 20px;">
                            等待生成中...
                        </p>
                    </div>
                    <div id="teaching-result"></div>
                </div>
            </div>

            <!-- 其他模式已移除 -->
        </div>
    </div>

    <script>
        let selectedTemplate = 'formal';

        // ── Accumulated file list (persists across multiple file-picker opens) ──
        let selectedFiles = [];   // Array of File objects

        // ── Template selection ──────────────────────────────────
        function selectTemplate(templateId, element) {
            selectedTemplate = templateId;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        // ── Add newly chosen files (merge, skip duplicates by name+size) ────────
        function addMaterialFiles() {
            const input = document.getElementById('teaching-materials');
            const newFiles = Array.from(input.files);
            newFiles.forEach(f => {
                const isDup = selectedFiles.some(e => e.name === f.name && e.size === f.size);
                if (!isDup) selectedFiles.push(f);
            });
            // Reset the input so the same file can be picked again later if needed
            input.value = '';
            renderMaterialFileList();
        }

        // ── Render the accumulated file list with remove buttons ────────────────
        function renderMaterialFileList() {
            const listDiv = document.getElementById('material-file-list');
            const countDiv = document.getElementById('material-count');
            listDiv.innerHTML = '';
            selectedFiles.forEach((f, idx) => {
                const item = document.createElement('div');
                item.className = 'material-file-item';
                item.innerHTML = `
                    <div class="file-label">
                        <span>${fileIcon(f.name)}</span>
                        <span title="${f.name}">${f.name}</span>
                    </div>
                    <button class="remove-btn" title="移除" onclick="removeMaterialFile(${idx})">✕</button>`;
                listDiv.appendChild(item);
            });
            countDiv.textContent = selectedFiles.length > 0
                ? `已选 ${selectedFiles.length} 个文件`
                : '';
        }

        // ── Remove a single file from the accumulated list ──────────────────────
        function removeMaterialFile(idx) {
            selectedFiles.splice(idx, 1);
            renderMaterialFileList();
        }

        function fileIcon(name) {
            const ext = name.split('.').pop().toLowerCase();
            const map = { pdf: '📕', docx: '📘', doc: '📘', txt: '📄', md: '📝',
                          png: '🖼', jpg: '🖼', jpeg: '🖼', gif: '🖼', bmp: '🖼' };
            return map[ext] || '📎';
        }

        // ── Drag-and-drop for the upload area ───────────────────
        function setupDragDrop(zoneId, inputId, addFn) {
            const zone = document.getElementById(zoneId);
            zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
            zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
            zone.addEventListener('drop', e => {
                e.preventDefault();
                zone.classList.remove('drag-over');
                const input = document.getElementById(inputId);
                const dt = new DataTransfer();
                Array.from(e.dataTransfer.files).forEach(f => dt.items.add(f));
                input.files = dt.files;
                addFn();
            });
        }

        // ── Generate lesson & PPT ───────────────────────────────
        async function generateLesson() {
            const theme = document.getElementById('teaching-theme').value.trim();
            const objectives = document.getElementById('teaching-objectives').value.trim();

            if (!theme || !objectives) {
                alert('请填写必填项：教学主题、学习目标');
                return;
            }

            const messagesDiv = document.getElementById('teaching-messages');
            const resultDiv  = document.getElementById('teaching-result');
            resultDiv.innerHTML = '';
            messagesDiv.innerHTML = `
                <div style="text-align:center; padding:20px;">
                    <div class="loading"></div>
                    <div class="loading"></div>
                    <div class="loading"></div>
                    <p style="margin-top:12px; color:#667eea;">正在生成教案与PPT，请稍候…</p>
                    <p style="color:#999; font-size:12px;">（通常需要 30-90 秒）</p>
                </div>`;

            const userInput = `教学主题：${theme}\n学习目标：${objectives}\nPPT风格：${selectedTemplate}`;

            const formData = new FormData();
            formData.append('message', userInput);
            formData.append('mode', 'teaching');
            formData.append('user_id', 'teacher_' + Date.now());
            formData.append('task_id', 'lesson_' + Date.now());
            // Append all accumulated teaching material files
            selectedFiles.forEach(f => formData.append('files', f));

            try {
                const response = await fetch('/send_message_with_files', { method: 'POST', body: formData });
                const data = await response.json();

                messagesDiv.innerHTML = '';

                if (data.error) {
                    messagesDiv.innerHTML = `<div class="error-message">❌ ${data.error}</div>`;
                    return;
                }

                const statusClass = data.status === 'completed' ? 'success' : 'error';
                messagesDiv.innerHTML = `
                    <div class="message assistant">
                        <div class="message-content">
                            ${data.response}
                            <span class="status-badge ${statusClass}">${data.status}</span>
                            <p style="margin-top:8px; color:#666; font-size:13px;">${data.processing_step || ''}</p>
                        </div>
                    </div>`;

                // ── Parse export results ──────────────────────
                const exportResult = data.export_result || {};
                const exports = exportResult.exports || {};
                const lessonPlan = exports.lesson_plan || {};
                const pptExport  = exports.ppt || {};

                let hasFiles = false;
                let resultHTML = '<div class="result-box"><h3>✅ 生成完成</h3>';

                // Lesson plan docx
                const docxFile = (lessonPlan.files || {}).docx;
                if (docxFile && docxFile.path) {
                    hasFiles = true;
                    resultHTML += `
                        <div class="result-item">
                            <strong>📄 教案文档：</strong><br>
                            ${docxFile.format || 'Word Document'} (${(docxFile.size_mb || 0).toFixed(2)} MB)<br>
                            <a href="/download?path=${encodeURIComponent(docxFile.path)}" class="download-btn" download>下载教案</a>
                        </div>`;
                }

                // PPT
                const pptFile = pptExport.file;
                if (pptFile && pptFile.path) {
                    hasFiles = true;
                    resultHTML += `
                        <div class="result-item">
                            <strong>🎨 PPT演示：</strong><br>
                            ${pptFile.format || 'PowerPoint'} (${(pptFile.size_mb || 0).toFixed(2)} MB)<br>
                            共 ${pptExport.total_slides || 0} 张幻灯片<br>
                            <a href="/download?path=${encodeURIComponent(pptFile.path)}" class="download-btn" download>下载PPT</a>
                        </div>`;
                }

                if (!hasFiles && data.status === 'completed') {
                    resultHTML += '<div class="result-item" style="color:#666;">文件已生成，请查看服务器 generated_lessons/ 目录。</div>';
                }

                resultHTML += '</div>';
                if (hasFiles || data.status === 'completed') {
                    resultDiv.innerHTML = resultHTML;
                }

            } catch (error) {
                console.error('Error:', error);
                messagesDiv.innerHTML = `<div class="error-message">❌ 请求出错：${error.message}</div>`;
            }
        }

        // ── Init ────────────────────────────────────────────────
        selectTemplate('formal', document.querySelector('.template-card'));
        setupDragDrop('materials-drop-zone', 'teaching-materials', addMaterialFiles);
    </script>
</body>
</html>
